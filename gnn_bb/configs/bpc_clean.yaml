# 中文摘要：clean BPC 默认配置。该主线使用根目录 bpc/，SCIP 只求解每个节点的 RMP LP。

python: /home/kai/miniconda3/envs/ecole/bin/python
instances: ["very_small"]
time_limit: 3600
random_seed: 20260511
instance_dir: json/instances
results_csv: results/bpc_clean.csv
log_dir: results/logs/bpc_clean
solution_dir: results/solutions/bpc_clean
log_level: progress

pricing_eps: 1.0e-6
integer_tol: 1.0e-6
max_nodes: 100000
max_routes_per_pricing: 500
root_max_routes_per_pricing: 1200
# 0 表示 exact pricing 不设 label 上限；若设为正数，中断的 pricing 不能用于证明节点 bound。
max_labels_per_pricing: 0

# 启发式 route pricing 先用 label 上限快速找负 reduced-cost 列。
# 若 label 上限触发且找不到新列，仍会继续运行完整 exact pricing；只有完整枚举才能证明节点 bound。
heuristic_pricing_enabled: true
heuristic_pricing_max_labels: 120000
heuristic_pricing_routes_per_round: 600
heuristic_pricing_selection_mode: diverse
exact_pricing_selection_mode: diverse

# 分支节点上的增强启发式定价：普通启发式找不到列时，先用更高 label 上限再试一次。
# 若 boost 没有触发 label 上限，它本身也能作为 certificate；否则仍回到完整 exact pricing。
branch_node_heuristic_boost_enabled: true
branch_node_heuristic_boost_max_labels: 900000
branch_node_heuristic_boost_routes_per_round: 1000
branch_node_heuristic_boost_min_depth: 1

# 安全 dominance：仅在所有带非零 dual 的 cut / branching 信息都进入 label 状态时启用；
# 顺序签名 cut 通过 active signature prefix mask 进入 dominance key，因此不再直接关闭 dominance。
exact_pricing_dominance_enabled: true

# route pool 受限整数主问题：只用于找 incumbent。
# 开启 schedule-aware 后，MIP 内部按临时 pair cut、schedule-capacity cut、no-good 的顺序排除排程不可行整数候选。
restricted_master_heuristic_enabled: true
restricted_master_time_limit: 20.0
restricted_master_max_routes: 4000
restricted_master_max_calls: 20
restricted_master_max_depth: 3
restricted_master_schedule_aware: true
restricted_master_max_no_good_rounds: 20

# no-ML Three-Phase Branching。testing 只用于选择分支，不用于剪枝或证明。
branching_strategy: 3pb
three_pb_pseudocost_candidates: 6
three_pb_fractional_candidates: 6
three_pb_lp_candidates: 3
three_pb_heuristic_cg_iterations: 3
three_pb_heuristic_routes_per_iter: 50
three_pb_heuristic_max_labels: 800

# task-vehicle linking:
# sum_p a_ip lambda[p,r] <= y[r]。这是有限 row，用于强化车辆固定成本的 LP 松弛。
task_vehicle_linking_enabled: true

# 统一 crossing cuts:
# x(delta(S)) >= 2 K(S), K(S)=max(Kcap(S), Kresource(S))。
# Kcap=ceil(d(S)/Q)，Kresource 由资源不兼容图 exact coloring 证明。
# cut manager 对同一 S 只保留 RHS 最大的一条 crossing_cut。
robust_capacity_cuts_enabled: true
robust_capacity_cut_max_depth: 0
robust_capacity_cut_max_subset_size: 5
robust_capacity_cut_max_per_round: 20
robust_capacity_cut_min_violation: 1.0e-5
robust_capacity_cut_max_rounds_per_node: 3

resource_lower_bound_cuts_enabled: true
resource_cut_max_depth: 0
resource_cut_max_subset_size: 6
resource_cut_max_per_round: 20
resource_cut_min_violation: 1.0e-5
resource_cut_max_rounds_per_node: 3

# Schedule capacity upper-bound cuts:
# sum_i z[i,r] <= U(S) y[r]，U(S) 由 exact 单车多 sortie schedule oracle 证明。
# oracle 超过状态上限时不加 cut。
schedule_capacity_cuts_enabled: true
schedule_capacity_cut_max_depth: 0
schedule_capacity_cut_max_subset_size: 10
schedule_capacity_cut_max_per_round: 20
schedule_capacity_cut_min_violation: 1.0e-5
schedule_capacity_cut_max_rounds_per_node: 3
schedule_capacity_oracle_max_states: 200000
schedule_capacity_candidate_top_tasks: 12
schedule_capacity_candidate_max_combinations: 300
schedule_capacity_route_union_top_routes: 8
schedule_capacity_route_union_max_routes: 4

# 只清洗 inactive robust cuts，不清洗 schedule no-good cuts。
cut_purge_age: 20
cut_purge_slack: 1.0e-5
cut_purge_dual: 1.0e-8

rmp_params:
  display/verblevel: 0
  randomization/randomseedshift: 20260511
  randomization/permutationseed: 20260511
  randomization/lpseed: 20260511
  parallel/maxnthreads: 1
  presolving/maxrounds: 0
  separating/maxrounds: 0
